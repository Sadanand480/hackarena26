version: "3.9"

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: cctv_threat_detection
      ALERT_THRESHOLD: "60"
      FRAME_SKIP: "5"
      MAX_FRAMES: "300"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      MODELS_DIR: "/app/models"
    volumes:
      - ./models:/app/models:ro
      - ./videos:/app/videos
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
